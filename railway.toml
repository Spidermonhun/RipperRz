[build]
builder = "dockerfile"

[service]
name = "razorripper-bot"
region = "oregon"

# 👇 Must expose the correct port for polling (webhook optional)
port = 8080

# ✅ Enable persistent storage for proxy files and logs
disk = true

# 🕵️‍♂️ Environment variables (set in Railway UI)
[[env]]
name = "BOT_TOKEN"
description = "Your @BotFather token"
required = true

[[env]]
name = "OWNER_ID"
description = "Your Telegram user ID (e.g., 123456789)"
required = true

# 🔁 Auto-restart on crash — because your code sucks without me
[restarts]
policy = "always"

# 🧪 Health check to keep alive
[health_check]
path = "/healthz"
interval_ms = 60000
timeout_ms = 10000
