service {
  name="razorripper-bot"
  region="oregon"
}

build {
  builder="dockerfile"
}

env {
  name="PYTHON_VERSION"
  value="3.11"
}

[[variables]]
name="BOT_TOKEN"
description="Your @BotFather token"

[[variables]]
name="OWNER_ID"
description="Your Telegram ID"

[[domains]]
domain="$PROJECT_NAME.up.railway.app"
target_port=8080

